<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Fridge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffe5ec;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      width: 380px;
      background: #ffccd5;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    input, button {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    input {
      background: #fff0f5;
      border: 1px solid #ff99ac;
    }
    button {
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #e63956;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Login</h1>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button id="loginBtn">Login</button>
</div>

<script>
  // Get button reference
  const loginBtn = document.getElementById('loginBtn');

  loginBtn.addEventListener('click', function() {
    // You can validate input if you want, but for demo we always redirect
    window.location.href = 'dashboard.html';
  });
</script>

</body>
</html>
