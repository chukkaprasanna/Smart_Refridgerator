<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge Items - Smart Fridge</title>
<style>
body { margin:0; font-family: Arial,sans-serif; background:#ffe5ec; display:flex; justify-content:center; }
.container { width:90%; max-width:800px; margin:50px auto; background:#ffccd5; padding:30px; border-radius:20px; box-shadow:0 0 20px rgba(0,0,0,0.2); }
h1 { color:#ff4d6d; text-align:center; margin-bottom:20px; }
table { width:100%; border-collapse: collapse; background:#fff0f5; border-radius:10px; overflow:hidden; }
th, td { padding:12px; text-align:center; border-bottom:1px solid #ff99ac; }
th { background:#ff4d6d; color:white; }
tr:hover { background:#ffe5ec; }
button { margin-top:20px; padding:10px 20px; border:none; border-radius:10px; background:#ff4d6d; color:white; cursor:pointer; display:block; margin-left:auto; margin-right:auto; }
button:hover { background:#e63956; }
</style>
</head>
<body>
<div class="container">
  <h1>Fridge Items</h1>
  <table id="itemsTable">
    <thead>
      <tr>
        <th>Item Name</th>
        <th>Quantity</th>
        <th>Unit</th>
        <th>Shelf</th>
        <th>Date Added</th>
        <th>Expiry Date</th>
      </tr>
    </thead>
    <tbody>
      <!-- Items will be added dynamically here -->
    </tbody>
  </table>
  <button onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
</div>

<script>
const tableBody = document.querySelector('#itemsTable tbody');
let items = JSON.parse(localStorage.getItem('fridgeItems') || '[]');

if(items.length === 0){
  const tr = document.createElement('tr');
  tr.innerHTML = '<td colspan="6">No items in fridge</td>';
  tableBody.appendChild(tr);
} else {
  items.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.name}</td>
      <td>${item.quantity}</td>
      <td>${item.unit}</td>
      <td>${item.shelf}</td>
      <td>${item.dateAdded}</td>
      <td>${item.expiry}</td>
    `;
    tableBody.appendChild(tr);
  });
}
</script>
</body>
</html>
